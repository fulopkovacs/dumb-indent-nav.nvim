name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit_tests:
    name: unit tests (${{ matrix.rev }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rev:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.rev }}

      - name: Prepare
        run: git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ../plenary.nvim

      - name: Run tests
        run: |
          nvim --version
          make test PLENARY=../plenary.nvim
